name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check PowerShell version
        shell: pwsh
        run: $PSVersionTable.PSVersion.ToString()

      - name: Compile
        run: npm run compile

      - name: Run QA fixture tests
        run: npm run test:qa

      - name: Check Marketplace metadata
        run: npm run marketplace:check

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-fde-vsdx-radar-vsix
          path: ai-fde-vsdx-radar-*.vsix
